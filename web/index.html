<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Agent — Evaluation Platform</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="app-header">
    <div class="header-left">
      <span class="app-logo">IA</span>
      <div>
        <div class="app-title">
          Interview Agent Evaluation
          <span id="user-display-email" style="font-size: 14px; font-weight: normal; color: #666; margin-left: 10px;"></span>
          <button id="reset-evals-btn" style="display:none; margin-left:10px; padding:2px 8px; font-size:11px; cursor:pointer; background:none; border:1px solid #ef4444; border-radius:4px; color:#ef4444;">Reset Evals</button>
          <button id="logout-btn" style="display:none; margin-left:10px; padding:2px 8px; font-size:11px; cursor:pointer; background:none; border:1px solid #ccc; border-radius:4px; color:#666;">Logout</button>
        </div>
        <div id="session-info" class="session-info"></div>
      </div>
    </div>
    <div class="header-right">
      <select id="dataset-select" class="dataset-select"></select>
      <span id="save-status" class="save-status"></span>
    </div>
  </header>

  <div class="overall-progress-container">
    <div id="overall-progress-bar" class="overall-progress-bar" style="width: 0%"></div>
    <span class="overall-progress-text">Overall Evaluation Progress</span>
  </div>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="jd">JD Parsing</button>
    <button class="tab-btn" data-tab="resume">Resume Parsing</button>
    <button class="tab-btn" data-tab="questions">Interview Questions</button>
    <button class="tab-btn" data-tab="analysis">Interview Analysis</button>
  </nav>

  <main id="content" class="content">
    <div class="loading">
      <div class="spinner"></div>
      Loading dataset…
    </div>
  </main>

  <script type="module" src="main.js"></script>
  <div id="login-screen" class="login-overlay">
  <div class="login-box">
    <h2>🛡️ Access Evaluation</h2>
    <p>Please enter your work email to continue.</p>
    <input type="email" id="login-email" placeholder="name@fusemachines.com" required>
    <button id="login-btn">Enter Platform</button>
  </div>
</div>
</body>
</html>
