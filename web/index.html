<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Evaluation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="app-header">
    <div class="header-left">
      <span class="app-logo">IA</span>
      <div>
        <div class="app-title">Interview Agent Evaluation</div>
        <div id="session-info" class="session-info"></div>
      </div>
    </div>
    <div class="header-right">
      <select id="dataset-select" class="dataset-select"></select>
      <span id="save-status" class="save-status"></span>
    </div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn" data-tab="jd">JD Parsing</button>
    <button class="tab-btn" data-tab="resume">Resume</button>
    <button class="tab-btn" data-tab="questions">Interview Questions</button>
    <button class="tab-btn active" data-tab="during">During Interview</button>
  </nav>

  <main id="content" class="content">
    <div class="loading">
      <div class="spinner"></div>
      Loading dataset…
    </div>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
